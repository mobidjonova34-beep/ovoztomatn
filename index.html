<!DOCTYPE html>

<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Ovoz Studiyasi</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
  text-align: center;
  width: 400px;
}

h2 {
  margin-bottom: 15px;
}

select, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  height: 100px;
  resize: none;
}

.buttons {
  margin-top: 15px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  margin: 5px;
  cursor: pointer;
  font-size: 14px;
}

.play {
  background: black;
  color: white;
}

.stop {
  background: red;
  color: white;
}
</style>

</head>

<body>

<div class="container">
  <h2>🎤 Ovoz Studiyasi</h2>

<select id="voice"></select>

  <textarea id="text" placeholder="Matn kiriting..."></textarea>

  <div class="buttons">
    <button class="play" onclick="gapir()">▶ O‘qib ber</button>
    <button class="stop" onclick="toxta()">■ To‘xtat</button>
  </div>
</div>

<script>
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  let select = document.getElementById("voice");

  select.innerHTML = "";

  voices.forEach((voice, i) => {
    let option = document.createElement("option");
    option.value = i;
    option.text = voice.name + " (" + voice.lang + ")";
    select.appendChild(option);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function gapir() {
  let text = document.getElementById("text").value;
  let voiceIndex = document.getElementById("voice").value;

  let speech = new SpeechSynthesisUtterance(text);
  speech.voice = voices[voiceIndex];

  speechSynthesis.speak(speech);
}

function toxta() {
  speechSynthesis.cancel();
}
</script>

</body>
</html>
