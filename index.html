<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Uzbek TTS Studio (Azure)</title>
<style>
body {
  font-family: Arial;
  background: #f3f1ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: #fff;
  padding: 20px;
  border-radius: 15px;
  width: 420px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
  padding: 10px;
}
button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border: none;
  background: #5a54d6;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
button:hover { background: #3f3ab3; }
.stop { background: #e74c3c; }
</style>
</head>

<body>

<div class="card">
<h3>🎤 Uzbek TTS Studio</h3>

<input type="password" id="apiKey" placeholder="Azure API Key"><br><br>
<input type="text" id="region" value="westeurope" placeholder="Region"><br>

<textarea id="text">Assalomu alaykum, bu tabiiy o'zbek ovoz sinovi.</textarea>

<button onclick="speak()">▶ O'qib ber</button>
<button class="stop" onclick="stopAudio()">⛔ To'xtat</button>

<p id="status"></p>
</div>

<script>
let audio = null;

async function speak() {
  const text = document.getElementById("text").value.trim();
  const key = document.getElementById("apiKey").value.trim();
  const region = document.getElementById("region").value.trim();

  const status = document.getElementById("status");

  if (!text) return status.innerText = "Matn kiriting";
  if (!key) return status.innerText = "API key kiriting";

  stopAudio();
  status.innerText = "Yuklanmoqda...";

  const ssml = `
  <speak version='1.0' xml:lang='uz-UZ'>
    <voice name='uz-UZ-SardorNeural'>
      <prosody rate="-10%" pitch="0%">
        ${text}
      </prosody>
    </voice>
  </speak>`;

  try {
    const res = await fetch(
      `https://${region}.tts.speech.microsoft.com/cognitiveservices/v1`,
      {
        method: "POST",
        headers: {
          "Ocp-Apim-Subscription-Key": key,
          "Content-Type": "application/ssml+xml",
          "X-Microsoft-OutputFormat": "audio-16khz-128kbitrate-mono-mp3"
        },
        body: ssml
      }
    );

    if (!res.ok) {
      status.innerText = "Xatolik: API yoki region noto'g'ri";
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    audio = new Audio(url);
    audio.play();

    status.innerText = "O'qilmoqda...";

    audio.onended = () => {
      status.innerText = "Tugadi";
      URL.revokeObjectURL(url);
    };

  } catch (e) {
    status.innerText = "Internet yoki API xatolik";
  }
}

function stopAudio() {
  if (audio) {
    audio.pause();
    audio.currentTime = 0;
    audio = null;
  }
}
</script>

</body>
</html>
