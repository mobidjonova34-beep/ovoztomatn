<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Ovoz studiyasi PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ece9ff,#f7f6ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card {
  background:#fff;
  padding:25px;
  border-radius:20px;
  width:380px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
.tabs,.gender {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#eee;
}
button.active {
  background:#5a54d6;
  color:#fff;
}
textarea {
  width:100%;
  height:110px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
.play {
  background:#5a54d6;
  color:#fff;
  margin-top:10px;
}
.stop {
  background:#ff4d4d;
  color:#fff;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="card">
<h2>🎤 Ovoz studiyasi</h2>

<div class="tabs">
<button class="active" onclick="setLang('uz',this)">O'zbek</button>
<button onclick="setLang('ru',this)">Русский</button>
<button onclick="setLang('en',this)">English</button>
</div>

<div class="gender">
<button class="active" onclick="setGender('female',this)">Ayol</button>
<button onclick="setGender('male',this)">Erkak</button>
</div>

<textarea id="text">Assalomu alaykum, bu chiroyli ovoz.</textarea>

<button class="play" onclick="speak()">▶ O'qib ber</button>
<button class="stop" onclick="stop()">⛔ To'xtat</button>

<p id="status"></p>
</div>

<script>
let synth = speechSynthesis;
let currentLang = "uz";
let currentGender = "female";

// til va jins tanlash
function setLang(lang,el){
  currentLang=lang;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}
function setGender(g,el){
  currentGender=g;
  document.querySelectorAll(".gender button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

// eng yaxshi ovozni tanlash
function getVoice(){
  let voices = synth.getVoices();

  let priority = [
    "Google UK English Female",
    "Google US English",
    "Microsoft Zira",
    "Microsoft David",
    "Microsoft Irina"
  ];

  for(let p of priority){
    let v = voices.find(v=>v.name.includes(p));
    if(v) return v;
  }

  return voices[0];
}

// matnni yaxshilash (MUHIM!)
function cleanText(text){
  return text
    .replace(/,/g, ", ")
    .replace(/\./g, ". ")
    .replace(/\s+/g, " ")
    .trim();
}

// gapirtirish
function speak(){
  let text = document.getElementById("text").value;
  let status = document.getElementById("status");

  text = cleanText(text);

  let utter = new SpeechSynthesisUtterance(text);
  utter.voice = getVoice();

  utter.rate = 0.85;
  utter.pitch = 1;

  synth.cancel();
  synth.speak(utter);

  status.innerText="O'qilmoqda...";
  utter.onend=()=>status.innerText="Tugadi";
}

// to'xtatish
function stop(){
  synth.cancel();
  document.getElementById("status").innerText="";
}
</script>

</body>
</html>
