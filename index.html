<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Ovoz studiyasi</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #eae7ff, #f6f5ff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #fff;
  padding: 25px;
  border-radius: 20px;
  width: 380px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 15px;
}

.tabs, .gender {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.tabs button, .gender button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #eee;
  cursor: pointer;
  transition: 0.2s;
}

.tabs button.active, .gender button.active {
  background: #5a54d6;
  color: white;
}

textarea {
  width: 100%;
  height: 110px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  resize: none;
}

button.play {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  background: #5a54d6;
  color: white;
  border-radius: 12px;
  font-weight: bold;
}

button.stop {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  border: none;
  background: #ff4d4d;
  color: white;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="card">
<h2>🎤 Ovoz studiyasi</h2>

<div class="tabs">
  <button class="active" onclick="setLang('uz', this)">O'zbek</button>
  <button onclick="setLang('ru', this)">Русский</button>
  <button onclick="setLang('en', this)">English</button>
</div>

<div class="gender">
  <button class="active" onclick="setGender('female', this)">Ayol</button>
  <button onclick="setGender('male', this)">Erkak</button>
</div>

<textarea id="text">Assalomu alaykum, bu chiroyli ovoz.</textarea>

<button class="play" onclick="speak()">▶ O'qib ber</button>
<button class="stop" onclick="stop()">⛔ To'xtat</button>

<p id="status"></p>
</div>

<script>
let synth = speechSynthesis;
let currentLang = "uz";
let currentGender = "female";

function setLang(lang, el) {
  currentLang = lang;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

function setGender(g, el) {
  currentGender = g;
  document.querySelectorAll(".gender button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

function getVoice() {
  let voices = synth.getVoices();

  let langMap = {
    uz: ["uz", "tr", "ru"],
    ru: ["ru"],
    en: ["en"]
  };

  let filtered = voices.filter(v =>
    langMap[currentLang].some(l => v.lang.toLowerCase().includes(l))
  );

  return filtered[0] || voices[0];
}

function speak() {
  let text = document.getElementById("text").value;
  let status = document.getElementById("status");

  let utter = new SpeechSynthesisUtterance(text);
  utter.voice = getVoice();
  utter.rate = 0.9;

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);

  status.innerText = "O'qilmoqda...";
  utter.onend = () => status.innerText = "Tugadi";
}

function stop() {
  speechSynthesis.cancel();
  document.getElementById("status").innerText = "";
}
</script>

</body>
</html>
