<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Ovoz studiyasi (API siz PRO)</title>
<style>
body {
  font-family: Arial;
  background: #f3f1ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: #fff;
  padding: 20px;
  border-radius: 15px;
  width: 420px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
  padding: 10px;
}
select, button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
}
</style>
</head>

<body>

<div class="card">
<h3>🎤 Ovoz studiyasi (API siz)</h3>

<select id="voiceSelect"></select>

<textarea id="text">Assalomu alaykum, bu yaxshilangan bepul ovoz.</textarea>

<button onclick="speak()">▶ O'qib ber</button>
<button onclick="stop()">⛔ To'xtat</button>

<p id="status"></p>
</div>

<script>
let synth = window.speechSynthesis;
let voices = [];

function loadVoices() {
  voices = synth.getVoices();
  const select = document.getElementById("voiceSelect");
  select.innerHTML = "";

  // faqat yaxshi ovozlarni chiqaramiz
  voices.forEach((v, i) => {
    if (v.lang.includes("en") || v.lang.includes("ru") || v.lang.includes("tr")) {
      let option = document.createElement("option");
      option.value = i;
      option.text = v.name + " (" + v.lang + ")";
      select.appendChild(option);
    }
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak() {
  const text = document.getElementById("text").value;
  const index = document.getElementById("voiceSelect").value;
  const status = document.getElementById("status");

  stop();

  let utter = new SpeechSynthesisUtterance(text);
  utter.voice = voices[index];

  // tabiiyroq qilish
  utter.rate = 0.85;
  utter.pitch = 1;
  utter.volume = 1;

  synth.speak(utter);

  status.innerText = "O'qilmoqda...";
  utter.onend = () => status.innerText = "Tugadi";
}

function stop() {
  synth.cancel();
}
</script>

</body>
</html>
